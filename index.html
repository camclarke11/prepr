<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#3f7a4f" />
    <!--
      Apply the saved theme before first paint so dark-mode users don't get a
      flash of the light background. App.tsx reconciles the full palette on mount.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('prepr.v2');
          var theme = raw ? JSON.parse(raw).theme : null;
          if (theme !== 'dark' && theme !== 'light') return;
          var dark = theme === 'dark';
          var root = document.documentElement;
          root.style.setProperty('--pr-bg', dark ? '#161715' : '#f1efe9');
          root.style.setProperty('--pr-text', dark ? '#ece9e1' : '#1c1c1a');
          root.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#161715' : '#3f7a4f');
        } catch (e) {
          /* localStorage blocked or malformed — fall back to CSS defaults */
        }
      })();
    </script>
    <meta
      name="description"
      content="prepr — a shared grocery list, recipe box, meal planner and pantry that works offline."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="prepr" />
    <meta property="og:title" content="prepr — shared grocery & meal planning" />
    <meta
      property="og:description"
      content="A shared grocery list, recipe box, meal planner and pantry that works offline."
    />
    <meta property="og:url" content="https://prepr.camlc.dev/" />
    <meta property="og:image" content="https://prepr.camlc.dev/pwa-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="prepr — shared grocery & meal planning" />
    <meta
      name="twitter:description"
      content="A shared grocery list, recipe box, meal planner and pantry that works offline."
    />
    <meta name="twitter:image" content="https://prepr.camlc.dev/pwa-512.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="prepr" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesque:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>prepr</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
